<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap{
            background-color: rgb(87, 87, 87);
            width: 700px;
            height: 700px;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: end;
        }
        .wrap>div{
            color: black;
            line-height: 100px;
            text-align: center;
            font-size: 40px;
            width: 100px;
            height: 100px;
        }
        .blue{
            background-color: lightblue;
        }
        .red{
            background-color: lightcoral;
        }
        .green{
            background-color: lightgreen;
        }
        .purple{
            background-color: rgb(219, 42, 219);
        }
        .cyan{
            background-color: lightcyan;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="blue">A</div>
        <div class="red">B</div>
        <div class="green">C</div>
        <div class="purple">D</div>
        <div class="cyan">E</div>
    </div>
    <h1 style="font-size: 120px;"></h1>
</body>
</html>
