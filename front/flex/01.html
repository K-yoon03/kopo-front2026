<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap{
            background-color: rgb(87, 87, 87);
            width: 700px;
            height: 700px;
            display: flex;
            justify-content: space-between;
        }
        .wrap>div>div{
            color: black;
            line-height: 100px;
            text-align: center;
            font-size: 40px;
            width: 100px;
            height: 100px;
        }
        .left-side{
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .center-side{
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }
        .right-side{
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: end;
        }
        .blue{
            background-color: lightblue;
        }
        .red{
            background-color: lightcoral;
        }
        .green{
            background-color: lightgreen;
        }
        .purple{
            background-color: rgb(219, 42, 219);
        }
        .cyan{
            background-color: lightcyan;
        }
        .orange{
            background-color:orange;
        }
        .white{
            background-color: white;
        }
        .pink{
            background-color: pink;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="left-side">
            <div class="blue">A</div>
            <div class="red">B</div>
            <div class="green">C</div>
        </div>
        <div class="center-side">
            <div class="purple">D</div>
            <div class="cyan">E</div>
        </div>
        <div class="right-side">
            <div class="orange">F</div>
            <div class="white">G</div>
            <div class="pink">H</div>
        </div>
    </div>
</body>
</html>
